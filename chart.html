<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Stock Chart - PulseQuant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0A0A0F;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 92, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 229, 255, 0.1);
            top: -250px;
            right: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(123, 92, 255, 0.08);
            bottom: -200px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        .navbar {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding: 0.8rem 2rem;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-container {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00E5FF, #7B5CFF, #C94BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: #9AA0A6;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #EAEAF0;
            background: rgba(0, 229, 255, 0.1);
        }

        .nav-link.active {
            color: #00E5FF;
            background: rgba(0, 229, 255, 0.1);
        }

        .controls {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            flex-shrink: 0;
            z-index: 9;
        }

        .nav-buttons {
            display: flex;
            gap: 0.5rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            background: rgba(17, 17, 24, 0.8);
            color: #EAEAF0;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        button:hover {
            border-color: #00E5FF;
            transform: translateY(-2px);
        }

        .nav-btn {
            background: rgba(0, 229, 255, 0.2);
            color: #00E5FF;
            border-color: rgba(0, 229, 255, 0.3);
        }

        .nav-btn:hover {
            background: rgba(0, 229, 255, 0.3);
        }

        #symbolDisplay {
            color: #EAEAF0;
            font-size: 1.3rem;
            font-weight: 600;
            margin-left: 1rem;
            padding-left: 1rem;
            border-left: 1px solid rgba(0, 229, 255, 0.3);
        }

        .exchange-badge {
            background: rgba(0, 229, 255, 0.2);
            color: #00E5FF;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .timeframe-info {
            color: #9AA0A6;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .delete-btn {
            background: rgba(201, 75, 255, 0.2);
            color: #C94BFF;
            border-color: rgba(201, 75, 255, 0.3);
        }

        .delete-btn:hover {
            background: rgba(201, 75, 255, 0.3);
        }

        .back-btn {
            background: rgba(123, 92, 255, 0.2);
            color: #7B5CFF;
            border-color: rgba(123, 92, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(123, 92, 255, 0.3);
        }

        #tvchart {
            flex: 1;
            width: 100%;
            min-height: 0;
            background: #0A0A0F;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 229, 255, 0.2);
            border-radius: 50%;
            border-top-color: #00E5FF;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #EAEAF0;
            font-size: 1.2rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(17, 17, 24, 0.95);
            backdrop-filter: blur(10px);
            color: #EAEAF0;
            padding: 1rem 2rem;
            border-radius: 50px;
            border-left: 4px solid #00E5FF;
            transform: translateY(200%);
            transition: transform 0.3s;
            z-index: 1001;
            border: 1px solid rgba(0, 229, 255, 0.2);
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.error {
            border-left-color: #C94BFF;
        }

        @media (max-width: 768px) {
            .controls {
                flex-wrap: wrap;
                padding: 1rem;
            }
            
            .nav-links {
                display: none;
            }
            
            #symbolDisplay {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
            }
        }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">PulseQuant</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>
    
    <div class="controls">
        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevStock()">← Prev</button>
            <button class="nav-btn" onclick="nextStock()">Next →</button>
        </div>
        
        <span id="symbolDisplay">Loading...</span>
        <span id="exchangeDisplay" class="exchange-badge">NSE</span>
        
        <div class="timeframe-info">
            <span>📅 1 Year Default</span>
        </div>
        
        <button class="delete-btn" onclick="deleteCurrentStock()">🗑️ Remove</button>
        <button class="back-btn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
    </div>
    
    <div id="tvchart"></div>
    
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading chart data...</div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // ==================== COMPLETE SYMBOL MAPPING ====================
        const urlParams = new URLSearchParams(window.location.search);
        let currentSymbol = urlParams.get('symbol') || 'RELIANCE';
        let currentIndex = urlParams.get('index') || '0';
        let watchlist = [];
        let tvWidget = null;
        
        // Comprehensive BSE stocks list
        const bseStocks = [
            'MUTHOOTFIN', 'PAGEIND', 'JUBLFOOD', 'PEL', 'MOTHERSON', 
            'NAUKRI', 'IDEA', 'GODREJPROP', 'BAJAJELEC', 'BHARATFORG',
            'CONCOR', 'CUMMINSIND', 'DLF', 'HAVELLS', 'ICICIPRULI',
            'INDIGO', 'LUPIN', 'MARICO', 'SIEMENS', 'SRTRANSFIN',
            'TORNTPHARM', 'UBL', 'PIDILITIND', 'COLPAL', 'BERGEPAINT'
        ];
        
        function isNumericCode(symbol) {
            return /^\d+$/.test(symbol);
        }
        
        function initialize() {
            document.getElementById('loadingOverlay').classList.add('active');
            
            loadWatchlist();
            currentSymbol = cleanSymbol(currentSymbol);
            
            const tradingViewSymbol = getTradingViewSymbol(currentSymbol);
            
            document.getElementById('symbolDisplay').textContent = currentSymbol;
            
            if (isNumericCode(currentSymbol)) {
                document.getElementById('exchangeDisplay').textContent = 'BSE Code';
            } else if (bseStocks.includes(currentSymbol)) {
                document.getElementById('exchangeDisplay').textContent = 'BSE';
            } else {
                document.getElementById('exchangeDisplay').textContent = 'NSE';
            }
            
            createChart(tradingViewSymbol);
        }
        
        function getTradingViewSymbol(symbol) {
            if (isNumericCode(symbol)) {
                return 'BSE:' + symbol;
            } else if (bseStocks.includes(symbol)) {
                return 'BSE:' + symbol;
            } else {
                return 'NSE:' + symbol;
            }
        }
        
        function loadWatchlist() {
            const saved = localStorage.getItem('pulsequant_watchlists');
            if (saved) {
                try {
                    const watchlists = JSON.parse(saved);
                    watchlist = [];
                    for (let i = 0; i < watchlists.length; i++) {
                        for (let j = 0; j < watchlists[i].stocks.length; j++) {
                            watchlist.push(watchlists[i].stocks[j]);
                        }
                    }
                    const uniqueWatchlist = [];
                    for (let i = 0; i < watchlist.length; i++) {
                        if (uniqueWatchlist.indexOf(watchlist[i]) === -1) {
                            uniqueWatchlist.push(watchlist[i]);
                        }
                    }
                    watchlist = uniqueWatchlist;
                } catch (e) {
                    console.log('Error parsing watchlists', e);
                }
            }
            
            if (watchlist.length === 0) {
                watchlist = [
                    'RELIANCE', 'TCS', 'HDFCBANK', 'INFY', 'ICICIBANK',
                    'HINDUNILVR', 'ITC', 'SBIN', 'BHARTIARTL', 'KOTAKBANK'
                ];
            }
            
            currentIndex = watchlist.indexOf(currentSymbol);
            if (currentIndex === -1) {
                currentIndex = 0;
                currentSymbol = watchlist[0];
            }
        }
        
        function cleanSymbol(symbol) {
            if (!symbol) return 'RELIANCE';
            symbol = symbol.replace('NSE:', '').replace('BSE:', '').replace('.NS', '').replace('.BO', '');
            return symbol;
        }
        
        function createChart(symbol) {
            tvWidget = new TradingView.widget({
                "container_id": "tvchart",
                "width": "100%",
                "height": "100%",
                "symbol": symbol,
                "interval": "1D",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "2",
                "locale": "en",
                "toolbar_bg": "#0A0A0F",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "save_image": false,
                "studies": ["Volume@tv-basicstudies"],
                "show_popup_button": true,
                "withdateranges": true,
                "autosize": true,
                "range": "12M",
                "loading_screen": {
                    "backgroundColor": "#0A0A0F",
                    "foregroundColor": "#00E5FF"
                }
            });
            
            tvWidget.onChartReady(function() {
                document.getElementById('loadingOverlay').classList.remove('active');
                showToast('Chart loaded successfully', 'success');
            });
        }
        
        function prevStock() {
            let i = parseInt(currentIndex);
            i--;
            if (i < 0) i = watchlist.length - 1;
            window.location.href = 'chart.html?symbol=' + watchlist[i] + '&index=' + i;
        }
        
        function nextStock() {
            let i = parseInt(currentIndex);
            i++;
            if (i >= watchlist.length) i = 0;
            window.location.href = 'chart.html?symbol=' + watchlist[i] + '&index=' + i;
        }
        
        function deleteCurrentStock() {
            if (confirm('Remove ' + currentSymbol + ' from all watchlists?')) {
                const watchlists = JSON.parse(localStorage.getItem('pulsequant_watchlists')) || [];
                
                for (let i = 0; i < watchlists.length; i++) {
                    const newStocks = [];
                    for (let j = 0; j < watchlists[i].stocks.length; j++) {
                        if (watchlists[i].stocks[j] !== currentSymbol) {
                            newStocks.push(watchlists[i].stocks[j]);
                        }
                    }
                    watchlists[i].stocks = newStocks;
                }
                
                const nonEmptyWatchlists = [];
                for (let i = 0; i < watchlists.length; i++) {
                    if (watchlists[i].stocks.length > 0) {
                        nonEmptyWatchlists.push(watchlists[i]);
                    }
                }
                
                localStorage.setItem('pulsequant_watchlists', JSON.stringify(nonEmptyWatchlists));
                
                const newWatchlist = [];
                for (let i = 0; i < watchlist.length; i++) {
                    if (watchlist[i] !== currentSymbol) {
                        newWatchlist.push(watchlist[i]);
                    }
                }
                watchlist = newWatchlist;
                
                showToast(currentSymbol + ' removed from watchlists', 'success');
                
                if (watchlist.length === 0) {
                    window.location.href = 'dashboard.html';
                } else {
                    let newIndex = currentIndex;
                    if (newIndex >= watchlist.length) newIndex = watchlist.length - 1;
                    window.location.href = 'chart.html?symbol=' + watchlist[newIndex] + '&index=' + newIndex;
                }
            }
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'error') {
                toast.classList.add('error');
            }
            toast.classList.add('show');
            
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                prevStock();
            } else if (e.key === 'ArrowRight') {
                nextStock();
            }
        });
        
        window.addEventListener('error', function(e) {
            console.log('Chart error:', e);
            document.getElementById('loadingOverlay').classList.remove('active');
            showToast('Error loading chart. Please try again.', 'error');
        });
        
        document.addEventListener('DOMContentLoaded', initialize);
        
        window.prevStock = prevStock;
        window.nextStock = nextStock;
        window.deleteCurrentStock = deleteCurrentStock;
    </script>
</body>
</html>
