<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - PulseQuant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0F;
            color: #EAEAF0;
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 92, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 229, 255, 0.1);
            top: -250px;
            right: -100px;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: rgba(123, 92, 255, 0.08);
            bottom: -200px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        .navbar {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00E5FF, #7B5CFF, #C94BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: #9AA0A6;
            text-decoration: none;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: #EAEAF0;
            background: rgba(0, 229, 255, 0.1);
        }

        .nav-link.active {
            color: #00E5FF;
            background: rgba(0, 229, 255, 0.1);
        }

        .back-btn {
            background: rgba(123, 92, 255, 0.2);
            color: #7B5CFF !important;
            border: 1px solid rgba(123, 92, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .watchlist-header {
            background: rgba(17, 17, 24, 0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .watchlist-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .watchlist-title h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00E5FF, #7B5CFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stock-count {
            background: rgba(0, 229, 255, 0.2);
            color: #00E5FF;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
        }

        .watchlist-meta {
            color: #9AA0A6;
            font-size: 0.95rem;
        }

        .search-box {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(17, 17, 24, 0.7);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            color: #EAEAF0;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-box input:focus {
            outline: none;
            border-color: #00E5FF;
        }

        .search-box .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9AA0A6;
        }

        .stocks-container {
            background: rgba(17, 17, 24, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .stock-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 80px;
            padding: 1rem 1.5rem;
            background: rgba(0, 229, 255, 0.1);
            font-weight: 600;
            color: #9AA0A6;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        }

        .stock-item {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 80px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            align-items: center;
        }

        .stock-item:last-child {
            border-bottom: none;
        }

        .stock-number {
            color: #9AA0A6;
        }

        .stock-symbol {
            font-weight: 600;
            color: #EAEAF0;
            cursor: pointer;
            transition: color 0.3s;
        }

        .stock-symbol:hover {
            color: #00E5FF;
        }

        .stock-price {
            color: #00E5FF;
        }

        .stock-change {
            color: #C94BFF;
        }

        .stock-change.positive {
            color: #00E5FF;
        }

        .stock-delete-btn {
            background: rgba(201, 75, 255, 0.2);
            color: #C94BFF;
            border: 1px solid rgba(201, 75, 255, 0.3);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 60px;
        }

        .stock-delete-btn:hover {
            background: rgba(201, 75, 255, 0.3);
            transform: translateY(-2px);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: rgba(17, 17, 24, 0.7);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 8px;
            color: #9AA0A6;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            color: #EAEAF0;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #00E5FF, #7B5CFF);
            color: #0A0A0F;
            border-color: #00E5FF;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #9AA0A6;
        }

        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            color: #9AA0A6;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">PulseQuant</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="dashboard.html" class="nav-link back-btn">← Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="watchlist-header">
            <div class="watchlist-title">
                <h1 id="watchlistName">Loading...</h1>
                <span id="stockCount" class="stock-count">0 stocks</span>
            </div>
            <div id="watchlistMeta" class="watchlist-meta"></div>
        </div>

        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search stocks in this watchlist...">
        </div>

        <div class="stocks-container">
            <div class="stock-header">
                <div>#</div>
                <div>Symbol</div>
                <div>Price</div>
                <div>Change</div>
                <div>Action</div>
            </div>
            <div id="stocksList"></div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <footer class="footer">
        <p>© 2024 PulseQuant. Click symbol to view chart.</p>
    </footer>

    <script src="watchlist.js"></script>
</body>
</html>
