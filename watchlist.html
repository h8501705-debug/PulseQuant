<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - StockVision Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a8b8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.1);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .watchlist-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .watchlist-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .watchlist-title h1 {
            font-size: 2rem;
        }

        .stock-count {
            background: rgba(255,215,0,0.2);
            color: #FFD700;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 1rem;
        }

        .search-box {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #FFD700;
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }

        .stocks-grid {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stock-header {
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px;
            padding: 1rem;
            background: rgba(255,255,255,0.15);
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stock-item {
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.3s;
        }

        .stock-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .stock-item:last-child {
            border-bottom: none;
        }

        .stock-number {
            color: rgba(255,255,255,0.5);
        }

        .stock-symbol {
            font-weight: 600;
        }

        .stock-price {
            color: #4caf50;
        }

        .stock-change {
            color: #ff4444;
        }

        .stock-change.positive {
            color: #4caf50;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .page-btn.active {
            background: #FFD700;
            color: #000;
            border-color: #FFD700;
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">StockVision Pro</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" class="back-btn" onclick="window.location.href='dashboard.html'">← Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="watchlistHeader" class="watchlist-header">
            <div class="watchlist-title">
                <h1 id="watchlistName">Loading...</h1>
                <span id="stockCount" class="stock-count">0 stocks</span>
            </div>
        </div>

        <div class="search-box">
            <i>🔍</i>
            <input type="text" id="searchInput" placeholder="Search stocks in this watchlist..." onkeyup="filterStocks()">
        </div>

        <div class="stocks-grid">
            <div class="stock-header">
                <div>#</div>
                <div>Symbol</div>
                <div>Price</div>
                <div>Change %</div>
            </div>
            <div id="stocksList"></div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <script src="watchlist.js"></script>
</body>
</html>
