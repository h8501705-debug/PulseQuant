<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Glowing Ring -->
    <circle cx="100" cy="100" r="85" stroke="url(#ringGradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="4 8"/>
    <circle cx="100" cy="100" r="75" stroke="url(#ringGradient)" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="2 6"/>
    
    <!-- Particle Effects -->
    <circle cx="50" cy="50" r="2" fill="#00E5FF" opacity="0.6">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="70" r="3" fill="#7B5CFF" opacity="0.4">
        <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="140" r="2" fill="#C94BFF" opacity="0.5">
        <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Heartbeat Line transforming to Candlesticks -->
    <path d="M40 110 L55 70 L70 120 L85 50 L100 90 L115 60 L130 100 L145 80 L160 110" 
          stroke="url(#heartbeatGradient)" stroke-width="3" fill="none" 
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
        <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Candlesticks emerging from heartbeat -->
    <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
        <!-- Bullish Candles -->
        <rect x="40" y="85" width="6" height="40" fill="#00E5FF" rx="2">
            <animate attributeName="height" values="0;40;40;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="125;85;85;125" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="60" y="70" width="6" height="55" fill="#00E5FF" rx="2">
            <animate attributeName="height" values="0;55;55;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="125;70;70;125" dur="4s" repeatCount="indefinite"/>
        </rect>
        <!-- Bearish Candle -->
        <rect x="80" y="65" width="6" height="45" fill="#C94BFF" rx="2">
            <animate attributeName="height" values="0;45;45;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="110;65;65;110" dur="4s" repeatCount="indefinite"/>
        </rect>
        <!-- Bullish Candles -->
        <rect x="100" y="55" width="6" height="55" fill="#00E5FF" rx="2">
            <animate attributeName="height" values="0;55;55;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="110;55;55;110" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="120" y="75" width="6" height="40" fill="#00E5FF" rx="2">
            <animate attributeName="height" values="0;40;40;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="115;75;75;115" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="140" y="85" width="6" height="30" fill="#C94BFF" rx="2">
            <animate attributeName="height" values="0;30;30;0" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="y" values="115;85;85;115" dur="4s" repeatCount="indefinite"/>
        </rect>
    </g>
    
    <!-- Gradients -->
    <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF"/>
            <stop offset="50%" stop-color="#7B5CFF"/>
            <stop offset="100%" stop-color="#C94BFF"/>
            <animate attributeName="x1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
            <animate attributeName="y1" values="0%;100%;0%" dur="5s" repeatCount="indefinite"/>
        </linearGradient>
        
        <linearGradient id="heartbeatGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00E5FF"/>
            <stop offset="50%" stop-color="#7B5CFF"/>
            <stop offset="100%" stop-color="#C94BFF"/>
        </linearGradient>
    </defs>
</svg>
